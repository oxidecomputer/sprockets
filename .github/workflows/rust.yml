#
# Configuration for GitHub-based CI, based on the stock GitHub Rust config.
#
name: Rust

on: [ push, pull_request, workflow_dispatch ]

defaults:
  run:
    shell: bash

jobs:
  check-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Report cargo version
        run: cargo --version
      - name: Report rustfmt version
        run: cargo fmt -- --version
      - name: Check style
        run: cargo fmt -- --check

  clippy-lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Lint with the quic feature off (default) and on, so neither
        # configuration regresses.
        features: ["", "--features quic"]
    steps:
      - uses: actions/checkout@v4
      - name: Report cargo version
        run: cargo --version
      - name: Report Clippy version
        run: cargo clippy -- --version
      - name: Run Clippy Lints
        run: cargo clippy ${{ matrix.features }} -- -D warnings

  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        # Build every target and run the tests with the quic feature off
        # (default) and on.
        features: ["", "--features quic"]
    steps:
      - uses: actions/checkout@v4
      - name: Report cargo version
        run: cargo --version
      - name: Report rustc version
        run: rustc --version
      - name: Build
        run: cargo build --all-targets ${{ matrix.features }} --verbose
      - name: Run tests
        run: cargo test ${{ matrix.features }} --verbose
